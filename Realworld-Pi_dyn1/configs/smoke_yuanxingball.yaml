base:
  openpi_root: ../RealWorld-Pi
  selected_preset: yuanxingball
  openpi_config_name: pi05_yuanxingball_20260518_lora
  checkpoint_dir: ../RealWorld-Pi/checkpoints/yuanxingball_20260518_lora/pi05_yuanxingball_20260518_lora/yuanxingball_20260518_lora_v1/19999
  prompt_key: prompt
  action_output_key: actions
  checkpoint_presets:
    yuanxingball:
      openpi_config_name: pi05_yuanxingball_20260518_lora
      checkpoint_dir: ../RealWorld-Pi/checkpoints/yuanxingball_20260518_lora/pi05_yuanxingball_20260518_lora/yuanxingball_20260518_lora_v1/19999
      dataset_root: /data1/vla-data/processed/PI/data/yuanxingball_20260518
      action_horizon: 10
      prompt: Place the tennis ball into the bowl.

model:
  action_dim: 7
  state_dim: 7
  d_obj: 32
  d_flow: 16
  d_pi05: 0
  d_model: 64
  d_h_tau: 64
  d_action_summary: 32
  hidden_dim: 128
  num_layers: 1
  num_heads: 4
  dropout: 0.05
  num_tasks: 8
  task_embedding_dim: 16
  codebook_size: 16
  num_latent_tokens: 4
  num_ego_tokens: 2
  tokenizer_warmup_epochs: 0
  use_pi05_feature: false

data:
  cache_root: caches/smoke_yuanxingball
  dataset_root: /data1/vla-data/processed/PI/data/yuanxingball_20260518
  raw_action_key: actions
  raw_state_key: state
  train_split: train
  val_split: val
  train_episodes: 1
  val_episodes: 1
  max_frames_per_episode: 32
  future_steps: [1, 2, 4]
  chunk_indices: [1, 2, 3, 4, 5, 6, 7]
  control_dt: 0.05
  latency_steps: 2
  task_id_default: 0
  require_action_space_audit: true
  action_space: raw_7d_xyz_axisangle_gripper

loss:
  lambda_delta: 0.5
  lambda_l2: 0.05
  lambda_vq: 0.25
  lambda_recon: 1.0
  lambda_robot: 0.1
  lambda_residual_l2: 0.0001

train:
  batch_size: 8
  epochs: 1
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  early_stop_patience: 1
  num_workers: 0
  seed: 7
  device: cuda

safety:
  per_dim_limit: null
  norm_limit: null
  stats_multiplier: 1.5
  fallback_on_nan: true
