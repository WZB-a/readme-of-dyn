base:
  openpi_root: ../RealWorld-Pi
  selected_preset: yuanxingball
  openpi_config_name: pi05_yuanxingball_20260518_lora
  checkpoint_dir: ../RealWorld-Pi/checkpoints/yuanxingball_20260518_lora/pi05_yuanxingball_20260518_lora/yuanxingball_20260518_lora_v1/19999
  prompt_key: prompt
  action_output_key: actions
  checkpoint_presets:
    yuanxingball:
      openpi_config_name: pi05_yuanxingball_20260518_lora
      checkpoint_dir: ../RealWorld-Pi/checkpoints/yuanxingball_20260518_lora/pi05_yuanxingball_20260518_lora/yuanxingball_20260518_lora_v1/19999
      dataset_root: /data1/vla-data/processed/PI/data/yuanxingball_20260518
      action_horizon: 10
      prompt: Place the tennis ball into the bowl.
    tank:
      openpi_config_name: pi05_tank_lora
      checkpoint_dir: /data1/vla-data/tank/openpi_training_outputs/checkpoints/pi05_tank_lora/tank_lora_4gpu_20260521/19999
      dataset_root: /data1/vla-data/processed/PI/data/tank
      action_horizon: 8
      prompt: Place the tank into the tray.
    clean_table:
      openpi_config_name: pi05_clean_table_lora
      checkpoint_dir: /data1/vla-data/clean_table/openpi_training_outputs/checkpoints/pi05_clean_table_lora/clean_table_lora_4gpu_20260521/12500
      dataset_root: /data1/vla-data/processed/PI/data/clean_table
      action_horizon: 10
      prompt: Put the vegetables into the basket.
    yuanxingcup:
      openpi_config_name: pi05_yuanxingcup_lora
      checkpoint_dir: /data1/vla-data/yuanxingcup/openpi_training_outputs/checkpoints/pi05_yuanxingcup_lora/yuanxingcup_lora_4gpu_20260521/19999
      dataset_root: /data1/vla-data/processed/PI/data/yuanxingcup
      action_horizon: 10
      prompt: Hang the mug on the mug rack.

model:
  action_dim: 7
  state_dim: 7
  d_obj: 128
  d_flow: 64
  d_pi05: 0
  d_model: 256
  d_h_tau: 256
  d_action_summary: 128
  hidden_dim: 512
  num_layers: 2
  num_heads: 4
  dropout: 0.05
  num_tasks: 64
  task_embedding_dim: 32
  codebook_size: 128
  num_latent_tokens: 4
  num_ego_tokens: 2
  tokenizer_warmup_epochs: 3
  use_pi05_feature: false

data:
  cache_root: caches/atg_vla
  dataset_root: /data1/vla-data/processed/PI/data/yuanxingball_20260518
  raw_action_key: actions
  raw_state_key: state
  train_split: train
  val_split: val
  train_episodes: 160
  val_episodes: 40
  max_frames_per_episode: null
  future_steps: [1, 2, 4, 6]
  chunk_indices: [1, 2, 3, 4, 5, 6, 7]
  control_dt: 0.05
  latency_steps: 2
  task_id_default: 0
  require_action_space_audit: true
  action_space: raw_7d_xyz_axisangle_gripper

loss:
  lambda_delta: 0.5
  lambda_l2: 0.05
  lambda_vq: 0.25
  lambda_recon: 1.0
  lambda_robot: 0.1
  lambda_residual_l2: 0.0001

train:
  batch_size: 128
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  early_stop_patience: 8
  num_workers: 4
  seed: 7
  device: cuda

safety:
  per_dim_limit: null
  norm_limit: null
  stats_multiplier: 1.5
  fallback_on_nan: true
